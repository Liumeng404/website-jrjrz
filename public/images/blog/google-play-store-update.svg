<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f7f0"/>
      <stop offset="100%" stop-color="#e4f0e8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="18"/>
  <!-- Google badge -->
  <rect x="40" y="35" width="80" height="28" rx="6" fill="#34a853" opacity="0.12"/>
  <text x="80" y="54" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#34a853" text-anchor="middle">Google</text>
  <!-- Title -->
  <text x="40" y="105" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1d1d1f">Google Play Store</text>
  <text x="40" y="140" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1d1d1f">更新指南</text>
  <text x="40" y="172" font-family="system-ui,sans-serif" font-size="14" fill="#6e6e73">最新版本 47.9.30 · 完整教程</text>
  <!-- Phone mockup -->
  <rect x="480" y="50" width="240" height="360" rx="24" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="496" y="70" width="208" height="320" rx="12" fill="#f5f5f7"/>
  <!-- Play Store icon area -->
  <rect x="520" y="100" width="160" height="80" rx="12" fill="white"/>
  <!-- Play triangle -->
  <polygon points="580,120 580,160 610,140" fill="#34a853"/>
  <!-- Google colors -->
  <circle cx="630" cy="125" r="8" fill="#4285f4"/>
  <circle cx="650" cy="125" r="8" fill="#ea4335"/>
  <circle cx="630" cy="145" r="8" fill="#fbbc04"/>
  <circle cx="650" cy="145" r="8" fill="#34a853"/>
  <!-- Version info -->
  <rect x="520" y="200" width="160" height="40" rx="8" fill="white"/>
  <text x="600" y="218" font-family="monospace" font-size="11" fill="#1d1d1f" text-anchor="middle">v47.9.30</text>
  <text x="600" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#34a853" text-anchor="middle">✓ 最新版本</text>
  <!-- Progress bars -->
  <rect x="520" y="260" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="520" y="260" width="140" height="8" rx="4" fill="#34a853"/>
  <rect x="520" y="280" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="520" y="280" width="100" height="8" rx="4" fill="#4285f4"/>
  <rect x="520" y="300" width="160" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="520" y="300" width="120" height="8" rx="4" fill="#fbbc04"/>
  <!-- Bottom labels -->
  <text x="520" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#6e6e73">安全性 ██████████</text>
  <text x="520" y="355" font-family="system-ui,sans-serif" font-size="10" fill="#6e6e73">兼容性 ████████</text>
  <text x="520" y="370" font-family="system-ui,sans-serif" font-size="10" fill="#6e6e73">稳定性 █████████</text>
  <!-- Steps on left -->
  <rect x="40" y="210" width="380" height="50" rx="10" fill="white" opacity="0.7"/>
  <circle cx="70" cy="235" r="14" fill="#34a853"/>
  <text x="70" y="240" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">1</text>
  <text x="96" y="232" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1d1d1f">检查当前版本</text>
  <text x="96" y="248" font-family="system-ui,sans-serif" font-size="11" fill="#6e6e73">设置 → 关于 → Play 商店版本</text>
  <rect x="40" y="270" width="380" height="50" rx="10" fill="white" opacity="0.7"/>
  <circle cx="70" cy="295" r="14" fill="#4285f4"/>
  <text x="70" y="300" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">2</text>
  <text x="96" y="292" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1d1d1f">手动或自动更新</text>
  <text x="96" y="308" font-family="system-ui,sans-serif" font-size="11" fill="#6e6e73">应用内更新 / APK 安装</text>
  <rect x="40" y="330" width="380" height="50" rx="10" fill="white" opacity="0.7"/>
  <circle cx="70" cy="355" r="14" fill="#ea4335"/>
  <text x="70" y="360" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle">3</text>
  <text x="96" y="352" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1d1d1f">故障排除</text>
  <text x="96" y="368" font-family="system-ui,sans-serif" font-size="11" fill="#6e6e73">10种常见问题解决方案</text>
</svg>
