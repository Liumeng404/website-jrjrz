  <circle cx="500" cy="172" r="12" fill="#6f86f6" opacity="0.15"/>
  <circle cx="500" cy="172" r="6" fill="#6f86f6"/>
  <line x1="500" y1="184" x2="500" y2="232" stroke="#6f86f6" stroke-width="2" opacity="0.3"/>
  <circle cx="500" cy="244" r="12" fill="#c875d8" opacity="0.15"/>
  <circle cx="500" cy="244" r="6" fill="#c875d8"/>
  <line x1="500" y1="256" x2="500" y2="304" stroke="#c875d8" stroke-width="2" opacity="0.3"/>
  <circle cx="500" cy="316" r="12" fill="#28c9ff" opacity="0.15"/>
