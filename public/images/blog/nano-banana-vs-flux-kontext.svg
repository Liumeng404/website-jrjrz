  <rect x="480" y="110" width="220" height="100" rx="8" fill="#f5f5f7"/>
  <text x="590" y="150" font-family="system-ui,sans-serif" font-size="13" fill="#6e6e73" text-anchor="middle">Black Forest Labs</text>
  <text x="590" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#6e6e73" text-anchor="middle">Flux Kontext</text>
  <text x="590" y="240" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#1d1d1f" text-anchor="middle">Flux Kontext</text>
