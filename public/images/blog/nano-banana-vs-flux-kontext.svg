  <!-- Left card: Nano Banana -->
  <rect x="80" y="90" width="260" height="280" rx="16" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="100" y="110" width="220" height="100" rx="8" fill="#f5f5f7"/>
  <text x="210" y="150" font-family="system-ui,sans-serif" font-size="13" fill="#6e6e73" text-anchor="middle">Toogle New Application</text>
  <text x="210" y="175" font-family="system-ui,sans-serif" font-size="11" fill="#6e6e73" text-anchor="middle">Nano Banana</text>
