backend:
  name: github
  repo: Liumeng404/website-jrjrz
  branch: main
  base_url: https://www.jrjrz.com
  auth_endpoint: /api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  # 手机/电脑均可改配置 → 提交后自动部署
  - name: "settings"
    label: "站点配置"
    files:
      - name: "prices"
        label: "套餐价格与规则"
        file: "public/prices.json"
        fields:
          - label: "ChatGPT"
            name: "chatgpt"
            widget: "object"
            fields:
              - { name: "plus", label: "Plus 月付（元）", widget: "number", value_type: "int", min: 1 }
              - { name: "pro5x", label: "Pro 5x 月付（元）", widget: "number", value_type: "int", min: 1 }
              - { name: "pro20x", label: "Pro 20x 月付（元）", widget: "number", value_type: "int", min: 1 }
          - label: "Claude"
            name: "claude"
            widget: "object"
            fields:
              - { name: "pro", label: "Pro 月付（元）", widget: "number", value_type: "int", min: 1 }
          - label: "SuperGrok"
            name: "grok"
            widget: "object"
            fields:
              - { name: "monthly", label: "月付（元）", widget: "number", value_type: "int", min: 1 }
              - { name: "bimonthly", label: "双月（元）", widget: "number", value_type: "int", min: 1 }
              - { name: "bimonthly_save", label: "双月节省（元，可手填；站点会按 月付×2−双月 自动重算）", widget: "number", value_type: "int", min: 0, required: false }
          - label: "付款方式（全站统一）"
            name: "payment"
            widget: "object"
            fields:
              - label: "支持方式标识"
                name: "methods"
                widget: "list"
                default: ["wechat"]
                field: { name: "method", label: "方式", widget: "string" }
                hint: "如 wechat；仅作标识，页面文案看下面几项"
              - { name: "label", label: "短标签", widget: "string", default: "微信支付", hint: "如：微信支付" }
              - { name: "labelWithRmb", label: "信任条文案", widget: "string", default: "微信支付，人民币结算" }
              - { name: "eyebrow", label: "眉标文案", widget: "string", default: "微信支付" }
              - { name: "ctaPoint", label: "CTA 点文案", widget: "string", default: "微信付款" }
              - { name: "faq", label: "付款 FAQ 完整答", widget: "text", default: "目前支持微信支付。企业采购、批量账号和周期续费需求可以提前联系客服沟通。" }
              - { name: "flow", label: "流程描述", widget: "string", default: "微信扫码完成付款" }
          - label: "售后与规则（全站统一）"
            name: "policy"
            widget: "object"
            fields:
              - { name: "refund", label: "退款规则短文案", widget: "string", default: "充值失败全额退款" }
              - { name: "noPassword", label: "密码规则短文案", widget: "string", default: "无需账号密码" }
              - { name: "ownAccount", label: "账号规则短文案", widget: "string", default: "原账号开通" }

      - name: "site_config"
        label: "TDK 与页脚"
        file: "public/site-config.json"
        fields:
          - label: "页面 TDK（博客除外）"
            name: "tdk"
            widget: "object"
            fields:
              - label: "首页"
                name: "home"
                widget: "object"
                fields:
                  - { name: "title", label: "Title 标题", widget: "string" }
                  - { name: "description", label: "Description 描述", widget: "text" }
                  - { name: "keywords", label: "Keywords 关键词（逗号分隔）", widget: "string", required: false }
              - label: "ChatGPT 子页"
                name: "chatgpt"
                widget: "object"
                fields:
                  - { name: "title", label: "Title 标题", widget: "string" }
                  - { name: "description", label: "Description 描述", widget: "text" }
                  - { name: "keywords", label: "Keywords 关键词", widget: "string", required: false }
              - label: "Claude 子页"
                name: "claude"
                widget: "object"
                fields:
                  - { name: "title", label: "Title 标题", widget: "string" }
                  - { name: "description", label: "Description 描述", widget: "text" }
                  - { name: "keywords", label: "Keywords 关键词", widget: "string", required: false }
              - label: "SuperGrok 子页"
                name: "grok"
                widget: "object"
                fields:
                  - { name: "title", label: "Title 标题", widget: "string" }
                  - { name: "description", label: "Description 描述", widget: "text" }
                  - { name: "keywords", label: "Keywords 关键词", widget: "string", required: false }

          - label: "页脚（胖页脚）"
            name: "footer"
            widget: "object"
            fields:
              - { name: "brandDesc", label: "品牌简介（左侧）", widget: "text" }
              - label: "链接列"
                name: "columns"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { name: "title", label: "列标题", widget: "string" }
                  - label: "链接"
                    name: "links"
                    widget: "list"
                    summary: "{{fields.text}}"
                    fields:
                      - { name: "text", label: "显示文字", widget: "string" }
                      - { name: "href", label: "链接 URL", widget: "string", hint: "如 /chatgpt 或 /blog/" }
                      - label: "特殊动作"
                        name: "action"
                        widget: "select"
                        required: false
                        default: ""
                        options:
                          - { label: "普通链接", value: "" }
                          - { label: "打开客服二维码", value: "qr" }
              - { name: "seoTitle", label: "关键词区标题", widget: "string", default: "热门关键词", required: false }
              - label: "关键词 / 内链（多行标签）"
                name: "seoLinks"
                widget: "list"
                summary: "{{fields.text}}"
                hint: "用于胖页脚 SEO 关键词，可加很多条"
                fields:
                  - { name: "text", label: "关键词文字", widget: "string" }
                  - { name: "href", label: "链接", widget: "string" }
              - { name: "copyright", label: "版权说明（© 后面那段）", widget: "text", required: false }

  - name: "blog"
    label: "博客文章"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { name: "title", label: "标题", widget: "string" }
      - { name: "description", label: "描述", widget: "text" }
      - { name: "pubDate", label: "发布日期", widget: "datetime" }
      - { name: "updatedDate", label: "更新日期", widget: "datetime", required: false }
      - { name: "draft", label: "草稿", widget: "boolean", default: false }
      - { name: "image", label: "封面图", widget: "image", required: false }
      - { name: "tags", label: "标签", widget: "list", required: false }
      - { name: "author", label: "作者", widget: "string", required: false, default: "露梦" }
      - { name: "body", label: "正文", widget: "markdown" }
